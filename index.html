<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Mizer | Crypto SKAm)</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/gun/gun.js"></script>
    <style>
        :root {
            --bg: #0d1117; --card: #161b22; --cyan: #58a6ff; --gold: #f2a900; --err: #f85149;
        }
        body {
            font-family: -apple-system, sans-serif; background: var(--bg); color: #c9d1d9;
            margin: 0; padding: 15px; overflow-x: hidden;
        }
        .header { text-align: center; padding: 20px 0; }
        .logo { 
            width: 80px; height: 80px; background: linear-gradient(45deg, #1f6feb, var(--cyan));
            border-radius: 22px; margin: 0 auto; display: flex; align-items: center; 
            justify-content: center; font-size: 40px; font-weight: bold; color: #fff;
            box-shadow: 0 0 30px rgba(88, 166, 255, 0.3); cursor: pointer;
        }
        .bal { font-size: 36px; font-weight: 800; margin: 10px 0; color: #fff; }
        .card { 
            background: var(--card); border-radius: 20px; padding: 20px; 
            margin-bottom: 15px; border: 1px solid #30363d;
        }
        .terminal {
            background: #010409; border-radius: 12px; padding: 15px;
            font-family: monospace; color: var(--cyan); font-size: 13px;
            min-height: 60px; margin-bottom: 15px; border: 1px solid #30363d;
            white-space: pre-wrap; word-break: break-all;
        }
        input {
            width: 100%; background: #010409; border: 1px solid #30363d;
            border-radius: 12px; padding: 12px; color: #fff; margin-bottom: 10px;
            box-sizing: border-box; outline: none;
        }
        .btn {
            width: 100%; padding: 15px; border-radius: 12px; border: none;
            font-weight: bold; cursor: pointer; transition: 0.3s;
        }
        .btn-blue { background: #1f6feb; color: #fff; }
        .btn-outline { background: transparent; border: 1px solid var(--cyan); color: var(--cyan); }
        
        #admin { 
            display: none; position: fixed; inset: 0; background: var(--bg);
            z-index: 1000; padding: 20px; overflow-y: auto;
        }
        .stat-item { margin-bottom: 10px; padding: 10px; background: #21262d; border-radius: 8px; }
    </style>
</head>
<body>

<div class="header">
    <div class="logo" id="logo">M</div>
    <div class="bal" id="bal-view">0.00 <span style="color:var(--gold); font-size:16px;">MZR</span></div>
    <div id="my-addr" style="font-size:10px; opacity:0.5; font-family:monospace;">Загрузка адреса...</div>
</div>

<div class="card">
    <div style="font-size:11px; margin-bottom:8px; color:var(--cyan)">AI ORACLE V3.0</div>
    <div class="terminal" id="ai-out">Система готова. Напишите что-нибудь...</div>
    <input type="text" id="ai-in" placeholder="Ваше сообщение...">
    <button class="btn btn-outline" onclick="app.chat()">Отправить Оракулу</button>
</div>

<div class="card">
    <input type="text" id="to-addr" placeholder="Адрес получателя (MZR-...)">
    <input type="number" id="to-amt" placeholder="Сумма">
    <button class="btn btn-blue" onclick="app.send()">Безопасный перевод</button>
</div>

<div id="admin">
    <h2 style="color:var(--gold)">NETWORK ROOT</h2>
    <div id="admin-stats"></div>
    <hr style="border:0; border-top:1px solid #30363d; margin:20px 0;">
    <input type="number" id="mint-amt" placeholder="Эмиссия монет">
    <button class="btn btn-blue" onclick="app.mint()">Минт в казну</button>
    <button class="btn" style="margin-top:15px; background:#30363d; color:#fff;" onclick="app.closeAdmin()">Закрыть</button>
</div>

<script>
const tg = window.Telegram.WebApp;
tg.expand();

// Настройки
const GUN_PEERS = ['https://gun-manhattan.herokuapp.com/gun'];
const gun = Gun(GUN_PEERS);
const net = gun.get('mizer_network_v4_prod');
const users = gun.get('mizer_registered_users');

// ВСТАВЬ СВОЙ API KEY СЮДА
const API_KEY = "ТВОЙ_КЛЮЧ_ЗДЕСЬ";

const app = {
    me: {
        id: tg.initDataUnsafe.user?.id || "DEBUG_USER",
        name: tg.initDataUnsafe.user?.first_name || "Admin"
    },
    addr: '',
    db: [],
    knownAddrs: new Set(),
    taps: 0,

    init() {
        this.addr = "MZR-" + this.me.id;
        document.getElementById('my-addr').innerText = "Ваш адрес: " + this.addr;
        
        // Регистрируем себя в сети
        users.get(this.addr).put({active: true});
        
        // Подписка на юзеров для проверки адресов
        users.map().on((v, k) => { if(k) this.knownAddrs.add(k); });

        // Подписка на транзакции
        net.map().on(data => {
            if(data && data.h && !this.db.find(x => x.h === data.h)) {
                this.db.push(data);
                this.render();
            }
        });

        // Секрет админки
        document.getElementById('logo').onclick = () => {
            this.taps++;
            if(this.taps >= 5) {
                if(prompt("Пароль:") === "mizer77") document.getElementById('admin').style.display = 'block';
                this.taps = 0;
            }
        };
    },

    render() {
        let b = 0, s = 0, txCount = 0;
        this.db.forEach(t => {
            const val = parseFloat(t.amt) || 0;
            if(t.from === "KAZNA") s += val;
            if(t.to === this.addr) b += val;
            if(t.from === this.addr) b -= val;
            txCount++;
        });

        document.getElementById('bal-view').innerHTML = `${b.toFixed(2)} <span style="color:var(--gold); font-size:16px;">MZR</span>`;
        
        document.getElementById('admin-stats').innerHTML = `
            <div class="stat-item"><b>Общая эмиссия:</b> ${s.toFixed(2)} MZR</div>
            <div class="stat-item"><b>Всего блоков:</b> ${txCount}</div>
            <div class="stat-item"><b>Узлов в сети:</b> ${this.knownAddrs.size}</div>
            <div class="stat-item"><b>Ваш баланс:</b> ${b.toFixed(2)}</div>
        `;
    },

    async chat() {
        const inp = document.getElementById('ai-in');
        const txt = inp.value;
        if(!txt) return;
        
        this.type("Думаю...");
        inp.value = '';

        try {
            let reply = "";
            if(API_KEY === "ТВОЙ_КЛЮЧ_ЗДЕСЬ") {
                reply = "Ошибка: API Ключ не установлен в коде. [REWARD: 5]";
            } else {
                const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${API_KEY}`, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({contents: [{parts: [{text: "Ты ИИ кошелька Mizer. Общайся. Если юзер сделал полезное, пиши в конце [REWARD: X] (от 10 до 50). Текст: " + txt}]}]})
                });
                const d = await res.json();
                reply = d.candidates[0].content.parts[0].text;
            }

            this.type(reply);
            const rew = reply.match(/\[REWARD: (\d+)\]/);
            if(rew) this.push("KAZNA", this.addr, rew[1], "AI_GRANT");

        } catch(e) { this.type("Ошибка связи с Оракулом."); }
    },

    type(m) {
        const out = document.getElementById('ai-out');
        out.innerText = m;
    },

    send() {
        const to = document.getElementById('to-addr').value.trim();
        const amt = parseFloat(document.getElementById('to-amt').value);
        const myBal = parseFloat(document.getElementById('bal-view').innerText);

        if(!this.knownAddrs.has(to)) {
            alert("ОШИБКА: Адрес получателя не найден в сети Mizer!");
            return;
        }
        if(amt > myBal) {
            alert("Недостаточно средств!");
            return;
        }
        if(amt <= 0) return;

        this.push(this.addr, to, amt, "TRANSFER");
        document.getElementById('to-amt').value = '';
        alert("Успешно отправлено!");
    },

    mint() {
        const a = document.getElementById('mint-amt').value;
        if(a > 0) {
            this.push("KAZNA", this.addr, a, "MINT");
            alert("Эмиссия проведена!");
        }
    },

    push(f, t, a, type) {
        const h = Math.random().toString(36).substring(2) + Date.now();
        net.get(h).put({from: f, to: t, amt: a, type: type, h: h});
    },

    closeAdmin() { document.getElementById('admin').style.display = 'none'; }
};

app.init();
</script>
</body>
</html>
