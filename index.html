<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Mizer | AI Economy</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/gun/gun.js"></script>
    <style>
        :root {
            --tg-bg: #17212b;
            --tg-text: #ffffff;
            --mizer-cyan: #00d2ff;
            --mizer-gold: #f2a900;
            --card-bg: #232e3c;
            --ai-glow: rgba(0, 210, 255, 0.2);
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background-color: var(--tg-bg);
            color: var(--tg-text);
            margin: 0; padding: 20px;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }
        .container { max-width: 400px; margin: 0 auto; }
        
        .header { text-align: center; margin-bottom: 25px; }
        .logo { 
            width: 70px; height: 70px; 
            background: linear-gradient(135deg, var(--mizer-cyan), #0080ff);
            border-radius: 20px; margin: 0 auto 15px;
            display: flex; align-items: center; justify-content: center;
            font-size: 35px; font-weight: 900; color: #000;
            box-shadow: 0 0 20px var(--ai-glow);
            cursor: pointer;
        }
        .balance { font-size: 40px; font-weight: 800; margin: 5px 0; }
        .mzr-label { color: var(--mizer-gold); font-size: 18px; }

        .card {
            background: var(--card-bg);
            border-radius: 24px; padding: 18px;
            margin-bottom: 16px;
            border: 1px solid rgba(255,255,255,0.05);
        }

        .ai-terminal {
            background: #101921;
            border: 1px solid var(--mizer-cyan);
            box-shadow: inset 0 0 10px var(--ai-glow);
            min-height: 100px;
            margin-bottom: 12px;
            padding: 15px;
            font-family: 'Courier New', monospace;
            font-size: 13px;
            color: var(--mizer-cyan);
            border-radius: 15px;
            /* Добавляем эти строки для исправления бага */
            white-space: pre-wrap; 
            word-wrap: break-word;
            overflow-y: auto;
        }
        .ai-status { font-size: 10px; text-transform: uppercase; margin-bottom: 5px; opacity: 0.7; }

        .input-mizer {
            width: 100%; background: #101921; border: 1px solid #3d4b59;
            border-radius: 14px; padding: 14px; color: #fff;
            margin-bottom: 12px; box-sizing: border-box; font-size: 15px;
        }
        .btn {
            width: 100%; padding: 16px; border-radius: 16px; border: none;
            font-weight: 700; cursor: pointer; transition: 0.2s; font-size: 16px;
        }
        .btn-primary { background: var(--mizer-cyan); color: #000; }
        .btn-ai { background: transparent; border: 1px solid var(--mizer-cyan); color: var(--mizer-cyan); }
        .btn:active { transform: scale(0.97); }

        #admin-panel { 
            display: none; position: fixed; inset: 0; 
            background: rgba(10, 15, 20, 0.98);
            z-index: 100; padding: 30px; backdrop-filter: blur(15px);
        }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <div class="logo" id="main-logo">M</div>
        <div class="balance" id="view-bal">0.00 <span class="mzr-label">MZR</span></div>
        <div id="view-addr" style="font-size: 10px; opacity: 0.4; font-family: monospace;"></div>
    </div>

    <!-- AI СОВЕТНИК -->
    <div class="card" style="border: 1px solid var(--mizer-cyan);">
        <div class="ai-status">● Mizer AI Oracle v1.0</div>
        <div class="ai-terminal" id="ai-chat">Приветствую. Опишите выполненную работу для получения гранта из казны.</div>
        <input type="text" id="ai-input" class="input-mizer" placeholder="Сегодня я сделал...">
        <button class="btn btn-ai" onclick="app.askAI()">Отправить на анализ</button>
    </div>

    <!-- ПЕРЕВОДЫ -->
    <div class="card">
        <h3 style="margin:0 0 15px 0; font-size: 14px; opacity: 0.6;">Перевод по адресу</h3>
        <input type="text" id="to-addr" class="input-mizer" placeholder="MZR-...">
        <input type="number" id="send-amt" class="input-mizer" placeholder="Сумма">
        <button class="btn btn-primary" onclick="app.send()">Подтвердить перевод</button>
    </div>
</div>

<!-- Скрытая Админка -->
<div id="admin-panel">
    <h2 style="color: var(--mizer-gold)">ROOT ACCESS</h2>
    <p id="stat-info" style="font-size: 12px;"></p>
    <input type="number" id="mint-amt" class="input-mizer" placeholder="Сумма эмиссии">
    <button class="btn btn-primary" onclick="app.mint()">Напечатать монеты</button>
    <button class="btn" style="margin-top:20px" onclick="app.closeAdmin()">Выход</button>
</div>

<script>
    const tg = window.Telegram.WebApp;
    tg.expand();

    const gun = Gun(['https://gun-manhattan.herokuapp.com/gun']);
    const mzrNet = gun.get('mizer_p2p_network_ai_v2');

    const app = {
        user: tg.initDataUnsafe.user || { id: 'LOCAL_DEV' },
        addr: '', chain: [], taps: 0, 
        isTyping: false,

        init() {
            this.addr = "MZR-" + this.user.id;
            document.getElementById('view-addr').innerText = this.addr;
            
            document.getElementById('main-logo').onclick = () => {
                this.taps++;
                if(this.taps >= 5) {
                    const p = prompt("Password:");
                    if(p === "mizer77") document.getElementById('admin-panel').style.display = 'block';
                }
            };
            this.sync();
        },

        sync() {
            mzrNet.map().on(block => {
                if(block && !this.chain.find(b => b.h === block.h)) {
                    this.chain.push(block);
                    this.updateUI();
                }
            });
        },

        updateUI() {
            let bal = 0, supply = 0;
            this.chain.forEach(b => {
                const a = Number(b.amt);
                if(b.to === this.addr) bal += a;
                if(b.from === this.addr) bal -= a;
                if(b.from === "KAZNA") supply += a;
            });
            document.getElementById('view-bal').innerHTML = bal.toFixed(2) + ' <span class="mzr-label">MZR</span>';
            document.getElementById('stat-info').innerText = `В обороте: ${supply} | Транзакций: ${this.chain.length}`;
        },

        // ЛОГИКА ИИ
        askAI() {
            if(this.isTyping) return;
            const text = document.getElementById('ai-input').value.toLowerCase();
            const chat = document.getElementById('ai-chat');
            
            if(text.length < 10) {
                this.typeAI("Слишком короткий отчет. ИИ требует подробностей.");
                return;
            }

            this.typeAI("Анализирую вклад в экосистему...");
            
            setTimeout(() => {
                // Простая проверка "на вшивость"
                const keywords = ['сделал', 'работа', 'код', 'дизайн', 'помог', 'отчет', 'mizer'];
                const found = keywords.some(word => text.includes(word));

                if(found) {
                    const reward = Math.floor(Math.random() * 40) + 10; // От 10 до 50
                    this.typeAI(`Анализ завершен. Ценность подтверждена. Начислено: ${reward} MZR.`);
                    this.pushBlock("KAZNA", this.addr, reward, "AI_GRANT");
                } else {
                    this.typeAI("Ошибка: Сообщение не содержит данных о полезной деятельности. Грант отклонен.");
                }
                document.getElementById('ai-input').value = '';
            }, 2000);
        },

        typeAI(msg) {
            this.isTyping = true;
            const chat = document.getElementById('ai-chat');
            chat.innerText = '';
            let i = 0;
            const interval = setInterval(() => {
                chat.innerText += msg[i];
                i++;
                if(i >= msg.length) {
                    clearInterval(interval);
                    this.isTyping = false;
                }
            }, 30);
        },

        send() {
            const to = document.getElementById('to-addr').value;
            const amt = parseFloat(document.getElementById('send-amt').value);
            if(amt > 0 && to) {
                this.pushBlock(this.addr, to, amt, "SEND");
                alert("Отправлено!");
            }
        },

        mint() {
            const amt = parseFloat(document.getElementById('mint-amt').value);
            this.pushBlock("KAZNA", this.addr, amt, "MINT");
            alert("Эмиссия ок");
        },

        pushBlock(from, to, amt, type) {
            const h = Math.random().toString(36).slice(2) + Date.now();
            mzrNet.get(h).put({ from, to, amt, type, h, ts: Date.now() });
        },

        closeAdmin() { document.getElementById('admin-panel').style.display = 'none'; }
    };

    app.init();
</script>

</body>
</html>
