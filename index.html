<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Mizer OS | Crypto SKAm)</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/gun/gun.js"></script>
    <style>
        :root { --bg: #0a0a0c; --card: #141417; --cyan: #00d2ff; --gold: #f2a900; --text: #e0e0e0; --accent: #1f6feb; }
        body { font-family: sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 15px; }
        .logo { width: 75px; height: 75px; background: linear-gradient(135deg, var(--accent), var(--cyan)); border-radius: 22px; margin: 20px auto 10px; display: flex; align-items: center; justify-content: center; font-size: 32px; font-weight: 900; color: #fff; cursor: pointer; }
        .bal-val { font-size: 42px; font-weight: 800; text-align: center; margin-bottom: 20px; }
        .card { background: var(--card); border-radius: 20px; padding: 15px; margin-bottom: 12px; border: 1px solid rgba(255,255,255,0.05); }
        .terminal { background: #000; border-radius: 12px; padding: 12px; font-family: monospace; color: var(--cyan); font-size: 13px; min-height: 50px; margin-bottom: 10px; border: 1px solid rgba(0, 210, 255, 0.2); }
        input { width: 100%; background: #1c1c21; border: 1px solid #2d2d35; border-radius: 12px; padding: 12px; color: #fff; margin-bottom: 10px; box-sizing: border-box; }
        .btn { width: 100%; padding: 14px; border-radius: 12px; border: none; font-weight: 700; cursor: pointer; }
        .btn-blue { background: var(--accent); color: #fff; }
        .btn-gold { background: var(--gold); color: #000; }
        #admin-screen { display: none; position: fixed; inset: 0; background: var(--bg); z-index: 1000; padding: 20px; overflow-y: auto; }
        .stat-line { font-family: monospace; font-size: 12px; padding: 8px 0; border-bottom: 1px solid #222; display: flex; justify-content: space-between; }
        .net-status { text-align: center; font-size: 10px; margin-top: 5px; transition: 0.3s; }
    </style>
</head>
<body>

<div id="main-ui">
    <div class="logo" id="main-logo">M</div>
    <div class="bal-val" id="bal-view">0.00</div>
    <div class="net-status" id="net-status" style="color: #ff4444;">● Offline</div>
    
    <div class="card" style="margin-top: 20px;">
        <div class="terminal" id="ai-out">Система Mizer готова.</div>
        <input type="text" id="ai-in" placeholder="Отчет для ИИ...">
        <button class="btn btn-gold" style="opacity: 0.8;" onclick="mzr.askAI()">Отправить</button>
    </div>

    <div class="card">
        <input type="text" id="to-addr" placeholder="MZR-адрес">
        <input type="number" id="to-amt" placeholder="Сумма">
        <button class="btn btn-blue" onclick="mzr.send()">Перевести</button>
    </div>
</div>

<div id="admin-screen">
    <div style="display:flex; justify-content:space-between; margin-bottom:20px;">
        <h2 style="color:var(--gold);">ROOT ACCESS</h2>
        <button onclick="mzr.exitAdmin()" style="color:#ff4444; background:none; border:none; font-weight:bold;">ВЫЙТИ</button>
    </div>
    
    <div class="card" id="admin-stats">
        <!-- Реальная статистика -->
    </div>

    <div class="card">
        <input type="number" id="mint-amt" placeholder="Количество MZR">
        <button class="btn btn-gold" onclick="mzr.mint()">Эмиссия (MINT)</button>
        <button class="btn" style="background:#331111; color:white; margin-top:10px;" onclick="mzr.burn()">Сжечь (BURN)</button>
    </div>
</div>

<script>
const tg = window.Telegram.WebApp;
const PASS = "mizer77"; // ПАРОЛЬ ТУТ

// Продвинутые пиры для лучшей связки
const gun = Gun({
    peers: [
        'https://gun-manhattan.herokuapp.com/gun',
        'https://peer.wall.org/gun',
        'https://gundb.com.br/gun'
    ]
});

const core = gun.get('mizer_v8_stable_net');
const users = gun.get('mizer_v8_registry');

const mzr = {
    id: "MZR-" + (tg.initDataUnsafe.user?.id || "DEV"),
    db: {},
    nodes: {},
    clicks: 0,

    init() {
        // Регистрация
        users.get(this.id).put({ active: true, time: Date.now() });

        // Слушаем пользователей
        users.map().on((v, k) => {
            if(v) {
                this.nodes[k] = v;
                this.updateNetStatus();
            }
        });

        // Слушаем цепь
        core.map().on((tx, id) => {
            if(tx && tx.h) {
                this.db[tx.h] = tx;
                this.recalc();
            }
        });

        // Секретка
        document.getElementById('main-logo').onclick = () => {
            this.clicks++;
            if(this.clicks >= 5) {
                if(prompt("PASSWORD:") === PASS) {
                    document.getElementById('admin-screen').style.display = 'block';
                }
                this.clicks = 0;
            }
        };
    },

    updateNetStatus() {
        const count = Object.keys(this.nodes).length;
        const indicator = document.getElementById('net-status');
        if(count > 1) {
            indicator.innerText = `● Online: ${count} Nodes`;
            indicator.style.color = "#00ff88";
        } else {
            indicator.innerText = `● Online: Admin Only`;
            indicator.style.color = "#ffaa00";
        }
    },

    recalc() {
        let b = 0, s = 0, txC = 0;
        Object.values(this.db).forEach(tx => {
            const a = parseFloat(tx.amt) || 0;
            if(tx.from === "KAZNA") s += a;
            if(tx.to === "VOID") s -= a;
            if(tx.to === this.id) b += a;
            if(tx.from === this.id) b -= a;
            txC++;
        });

        document.getElementById('bal-view').innerText = b.toFixed(2);
        
        const st = document.getElementById('admin-stats');
        if(st) {
            st.innerHTML = `
                <div class="stat-line"><span>SUPPLY:</span> <b>${s.toFixed(2)}</b></div>
                <div class="stat-line"><span>NODES:</span> <b>${Object.keys(this.nodes).length}</b></div>
                <div class="stat-line"><span>BLOCKS:</span> <b>${txC}</b></div>
                <div class="stat-line"><span>MY ADDR:</span> <b style="font-size:8px;">${this.id}</b></div>
            `;
        }
    },

    send() {
        const to = document.getElementById('to-addr').value.trim();
        const amt = parseFloat(document.getElementById('to-amt').value);
        if(!this.nodes[to]) return alert("Адрес не найден в сети!");
        if(amt > parseFloat(document.getElementById('bal-view').innerText)) return alert("Мало монет!");
        
        this.push(this.id, to, amt, "TRANSFER");
        alert("Отправлено!");
    },

    mint() {
        const a = parseFloat(document.getElementById('mint-amt').value);
        if(a > 0) this.push("KAZNA", this.id, a, "MINT");
    },

    burn() {
        const a = parseFloat(document.getElementById('mint-amt').value);
        if(a > 0) this.push(this.id, "VOID", a, "BURN");
    },

    push(f, t, a, type) {
        const h = 'tx' + Math.random().toString(36).substr(2, 9) + Date.now();
        core.get(h).put({ from: f, to: t, amt: a, h: h, type: type });
    },

    askAI() {
        const inp = document.getElementById('ai-in');
        if(!inp.value) return;
        document.getElementById('ai-out').innerText = "Обработка запроса...";
        setTimeout(() => {
            this.push("KAZNA", this.id, 10, "REWARD");
            document.getElementById('ai-out').innerText = "Отлично! За отчет начислено 10 MZR.";
            inp.value = '';
        }, 800);
    },

    exitAdmin() { document.getElementById('admin-screen').style.display = 'none'; }
};

mzr.init();
</script>
</body>
</html>
