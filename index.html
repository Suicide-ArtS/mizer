<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Mizer | AI Economy</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/gun/gun.js"></script>
    <style>
        :root {
            --tg-bg: #17212b;
            --tg-text: #ffffff;
            --mizer-cyan: #00d2ff;
            --mizer-gold: #f2a900;
            --card-bg: #232e3c;
            --ai-glow: rgba(0, 210, 255, 0.2);
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background-color: var(--tg-bg);
            color: var(--tg-text);
            margin: 0; padding: 20px;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }
        .container { max-width: 400px; margin: 0 auto; }
        
        .header { text-align: center; margin-bottom: 25px; }
        .logo { 
            width: 70px; height: 70px; 
            background: linear-gradient(135deg, var(--mizer-cyan), #0080ff);
            border-radius: 20px; margin: 0 auto 15px;
            display: flex; align-items: center; justify-content: center;
            font-size: 35px; font-weight: 900; color: #000;
            box-shadow: 0 0 20px var(--ai-glow);
            cursor: pointer;
        }
        .balance { font-size: 40px; font-weight: 800; margin: 5px 0; }
        .mzr-label { color: var(--mizer-gold); font-size: 18px; }

        .card {
            background: var(--card-bg);
            border-radius: 24px; padding: 18px;
            margin-bottom: 16px;
            border: 1px solid rgba(255,255,255,0.05);
        }

        .ai-terminal {
            background: #101921;
            border: 1px solid var(--mizer-cyan);
            box-shadow: inset 0 0 10px var(--ai-glow);
            min-height: 80px;
            margin-bottom: 12px;
            padding: 15px;
            font-family: 'Courier New', monospace;
            font-size: 14px;
            color: var(--mizer-cyan);
            border-radius: 15px;
            white-space: pre-wrap; 
            word-wrap: break-word;
        }

        .input-mizer {
            width: 100%; background: #101921; border: 1px solid #3d4b59;
            border-radius: 14px; padding: 14px; color: #fff;
            margin-bottom: 12px; box-sizing: border-box; font-size: 15px;
            outline: none;
        }
        .btn {
            width: 100%; padding: 16px; border-radius: 16px; border: none;
            font-weight: 700; cursor: pointer; transition: 0.2s; font-size: 16px;
        }
        .btn-primary { background: var(--mizer-cyan); color: #000; }
        .btn-ai { background: transparent; border: 1px solid var(--mizer-cyan); color: var(--mizer-cyan); }
        .btn:active { transform: scale(0.97); }

        #admin-panel { 
            display: none; position: fixed; inset: 0; 
            background: rgba(10, 15, 20, 0.98);
            z-index: 100; padding: 30px; backdrop-filter: blur(15px);
        }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <div class="logo" id="main-logo">M</div>
        <div class="balance" id="view-bal">0.00 <span class="mzr-label">MZR</span></div>
        <div id="view-addr" style="font-size: 10px; opacity: 0.4; font-family: monospace;"></div>
    </div>

    <!-- AI СОВЕТНИК -->
    <div class="card" style="border: 1px solid var(--mizer-cyan);">
        <div style="font-size: 10px; opacity: 0.5; margin-bottom: 5px;">● MIZER AI ORACLE V2.0</div>
        <div class="ai-terminal" id="ai-chat">Система активна. Жду ваших действий...</div>
        <input type="text" id="ai-input" class="input-mizer" placeholder="Общайтесь или пишите отчет...">
        <button class="btn btn-ai" id="btn-ask">Отправить Оракулу</button>
    </div>

    <!-- ПЕРЕВОДЫ -->
    <div class="card">
        <input type="text" id="to-addr" class="input-mizer" placeholder="Кому (MZR-...)">
        <input type="number" id="send-amt" class="input-mizer" placeholder="Сумма">
        <button class="btn btn-primary" id="btn-send">Перевести MZR</button>
    </div>
</div>

<div id="admin-panel">
    <h2 style="color: var(--mizer-gold)">ROOT ACCESS</h2>
    <p id="stat-info"></p>
    <input type="number" id="mint-amt" class="input-mizer" placeholder="Сумма минта">
    <button class="btn btn-primary" id="btn-mint">Создать из пустоты</button>
    <button class="btn" style="margin-top:20px; background: #3d4b59; color: #fff;" id="btn-close-admin">Закрыть</button>
</div>

<script>
    const tg = window.Telegram.WebApp;
    tg.expand();

    // 1. ИНИЦИАЛИЗАЦИЯ СЕТИ
    const gun = Gun(['https://gun-manhattan.herokuapp.com/gun']);
    const mzrNet = gun.get('mizer_p2p_v3_stable'); // Новый ключ сети для чистоты теста

    // ТВОЙ КЛЮЧ GEMINI (Вставь его сюда)
    const GEMINI_API_KEY = "ВАШ_КЛЮЧ_ИЗ_AI_STUDIO"; 

    const app = {
        user: tg.initDataUnsafe.user || { id: '7837464637' }, // Твой ID со скриншота
        addr: '', 
        chain: [], 
        taps: 0,
        isTyping: false,

        init() {
            this.addr = "MZR-" + this.user.id;
            document.getElementById('view-addr').innerText = this.addr;
            
            // Навешиваем события
            document.getElementById('main-logo').addEventListener('click', () => this.handleLogoClick());
            document.getElementById('btn-ask').onclick = () => this.askAI();
            document.getElementById('btn-send').onclick = () => this.sendMZR();
            document.getElementById('btn-mint').onclick = () => this.mint();
            document.getElementById('btn-close-admin').onclick = () => this.closeAdmin();

            this.sync();
        },

        handleLogoClick() {
            this.taps++;
            if(this.taps >= 5) {
                const p = prompt("ROOT PASSWORD:");
                if(p === "mizer77") document.getElementById('admin-panel').style.display = 'block';
                this.taps = 0;
            }
            setTimeout(() => this.taps = 0, 2000);
        },

        sync() {
            mzrNet.map().on(block => {
                if(block && !this.chain.find(b => b.h === block.h)) {
                    this.chain.push(block);
                    this.updateUI();
                }
            });
        },

        updateUI() {
            let bal = 0, supply = 0;
            this.chain.forEach(b => {
                const a = Number(b.amt);
                if(b.to === this.addr) bal += a;
                if(b.from === this.addr) bal -= a;
                if(b.from === "KAZNA") supply += a;
            });
            document.getElementById('view-bal').innerHTML = bal.toFixed(2) + ' <span class="mzr-label">MZR</span>';
            document.getElementById('stat-info').innerText = `Supply: ${supply} | Blocks: ${this.chain.length}`;
        },

        async askAI() {
            if(this.isTyping) return;
            const input = document.getElementById('ai-input');
            const promptStr = input.value;
            if(!promptStr) return;

            this.typeAI("Связь с нейросетью...");
            input.value = '';

            try {
                // Если ключа нет - используем имитацию
                let aiText;
                if(GEMINI_API_KEY === "ВАШ_КЛЮЧ_ИЗ_AI_STUDIO") {
                    aiText = "Внимание: API ключ не найден. Я работаю в режиме симуляции. Чтобы я стал настоящим ИИ, вставь ключ в код! [REWARD: 10]";
                } else {
                    aiText = await this.callGemini(promptStr);
                }

                this.typeAI(aiText);

                const reward = aiText.match(/\[REWARD: (\d+)\]/);
                if(reward) {
                    const amt = parseInt(reward[1]);
                    setTimeout(() => {
                        this.pushBlock("KAZNA", this.addr, amt, "AI_GRANT");
                    }, 1000);
                }
            } catch(e) {
                this.typeAI("Сбой нейронного интерфейса. Попробуйте позже.");
            }
        },

        async callGemini(text) {
            const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${GEMINI_API_KEY}`;
            const sys = "Ты — Mizer AI Oracle. Оценивай труд пользователя. Если он принес пользу, пиши в конце [REWARD: X] где X от 10 до 50. Если просто болтает — не пиши награду.";
            const res = await fetch(url, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ contents: [{ parts: [{ text: sys + "\n\nЮзер: " + text }] }] })
            });
            const data = await res.json();
            return data.candidates[0].content.parts[0].text;
        },

        typeAI(msg) {
            this.isTyping = true;
            const chat = document.getElementById('ai-chat');
            chat.innerText = '';
            let i = 0;
            const interval = setInterval(() => {
                chat.innerText += msg[i];
                i++;
                if(i >= msg.length) { clearInterval(interval); this.isTyping = false; }
            }, 25);
        },

        sendMZR() {
            const to = document.getElementById('to-addr').value;
            const amt = parseFloat(document.getElementById('send-amt').value);
            const myBal = parseFloat(document.getElementById('view-bal').innerText);

            if(amt > 0 && myBal >= amt && to.startsWith("MZR-")) {
                this.pushBlock(this.addr, to, amt, "SEND");
                document.getElementById('send-amt').value = '';
                alert("Транзакция отправлена в сеть!");
            } else {
                alert("Ошибка: Проверьте баланс или адрес!");
            }
        },

        mint() {
            const amt = parseFloat(document.getElementById('mint-amt').value);
            if(amt > 0) {
                this.pushBlock("KAZNA", this.addr, amt, "MINT");
                alert("Монеты созданы!");
            }
        },

        pushBlock(from, to, amt, type) {
            const h = Math.random().toString(36).slice(2) + Date.now();
            mzrNet.get(h).put({ from, to, amt, type, h, ts: Date.now() });
        },

        closeAdmin() { document.getElementById('admin-panel').style.display = 'none'; }
    };

    app.init();
</script>

</body>
</html>
