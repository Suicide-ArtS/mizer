<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Mizer | Crypto SKAm)</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/gun/gun.js"></script>
    <!-- Подключаем модуль памяти для Gun, чтобы данные не исчезали -->
    <script src="https://cdn.jsdelivr.net/npm/gun/lib/radix.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/gun/lib/radisk.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/gun/lib/store.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/gun/lib/rstorage.js"></script>
    <style>
        :root { --bg: #0d1117; --card: #161b22; --cyan: #58a6ff; --gold: #f2a900; }
        body { font-family: sans-serif; background: var(--bg); color: #c9d1d9; margin: 0; padding: 15px; }
        .logo { width: 70px; height: 70px; background: #1f6feb; border-radius: 18px; margin: 20px auto; display: flex; align-items: center; justify-content: center; font-size: 30px; font-weight: bold; cursor: pointer; }
        .bal { text-align: center; font-size: 32px; font-weight: 800; margin-bottom: 20px; }
        .card { background: var(--card); border-radius: 16px; padding: 15px; margin-bottom: 10px; border: 1px solid #30363d; }
        input { width: 100%; background: #010409; border: 1px solid #30363d; border-radius: 8px; padding: 12px; color: #fff; margin-bottom: 10px; box-sizing: border-box; }
        .btn { width: 100%; padding: 15px; border-radius: 12px; border: none; font-weight: bold; cursor: pointer; }
        .btn-blue { background: #1f6feb; color: #fff; }
        #admin { display: none; position: fixed; inset: 0; background: var(--bg); z-index: 100; padding: 20px; }
        .stat-line { padding: 8px 0; border-bottom: 1px solid #30363d; font-family: monospace; }
    </style>
</head>
<body>

<div class="logo" id="logo">M</div>
<div class="bal" id="bal-view">0.00 MZR</div>
<div id="addr-view" style="text-align:center; font-size:10px; opacity:0.5; margin-bottom:20px;">Загрузка...</div>

<div class="card">
    <input type="text" id="to-addr" placeholder="MZR-адрес получателя">
    <input type="number" id="to-amt" placeholder="Сумма">
    <button class="btn btn-blue" onclick="app.send()">Отправить монеты</button>
</div>

<div id="admin">
    <h2>NETWORK MONITOR</h2>
    <div id="stats-box"></div>
    <button class="btn btn-blue" style="margin-top:20px" onclick="app.mint()">Создать 1000 MZR</button>
    <button class="btn" style="margin-top:10px" onclick="app.closeAdmin()">Назад</button>
</div>

<script>
const tg = window.Telegram.WebApp;
tg.expand();

// Используем несколько пиров для надежности
const gun = Gun({
    peers: [
        'https://gun-manhattan.herokuapp.com/gun',
        'https://gun-us.herokuapp.com/gun'
    ],
    localStorage: true // ВКЛЮЧАЕМ локальное хранение
});

const net = gun.get('mizer_global_v5'); // Новая версия сети
const registry = gun.get('mizer_nodes_registry');

const app = {
    addr: "MZR-" + (tg.initDataUnsafe.user?.id || "DEBUG"),
    db: {}, // Используем объект вместо массива для предотвращения дублей
    nodes: {},
    taps: 0,

    init() {
        document.getElementById('addr-view').innerText = this.addr;
        
        // 1. Регистрируем наш узел в глобальном списке
        registry.get(this.addr).put({ lastSeen: Date.now() });

        // 2. Слушаем список всех узлов
        registry.map().on((data, id) => {
            if(data) this.nodes[id] = data;
            this.updateStats();
        });

        // 3. Слушаем все транзакции
        net.map().on((data, id) => {
            if(data && data.h) {
                this.db[data.h] = data;
                this.calculate();
            }
        });

        // Админка
        document.getElementById('logo').onclick = () => {
            this.taps++;
            if(this.taps >= 5) {
                document.getElementById('admin').style.display = 'block';
                this.taps = 0;
            }
        };
    },

    calculate() {
        let balance = 0;
        let supply = 0;
        
        Object.values(this.db).forEach(tx => {
            const amt = parseFloat(tx.amt) || 0;
            if(tx.from === "KAZNA") supply += amt;
            if(tx.to === this.addr) balance += amt;
            if(tx.from === this.addr) balance -= amt;
        });

        document.getElementById('bal-view').innerText = balance.toFixed(2) + " MZR";
        this.updateStats(supply);
    },

    updateStats(supply = 0) {
        const statsBox = document.getElementById('stats-box');
        const nodesCount = Object.keys(this.nodes).length;
        const txCount = Object.keys(this.db).length;

        statsBox.innerHTML = `
            <div class="stat-line">ID: ${this.addr}</div>
            <div class="stat-line">Ваш баланс: ${document.getElementById('bal-view').innerText}</div>
            <div class="stat-line">Узлов в сети: ${nodesCount}</div>
            <div class="stat-line">Всего транзакций: ${txCount}</div>
            <div class="stat-line">Эмиссия: ${supply.toFixed(2)} MZR</div>
        `;
    },

    send() {
        const to = document.getElementById('to-addr').value.trim();
        const amt = parseFloat(document.getElementById('to-amt').value);
        
        if(!this.nodes[to]) {
            alert("Этот адрес еще не заходил в сеть Mizer!");
            return;
        }

        const h = Math.random().toString(36).substring(7) + Date.now();
        net.get(h).put({
            from: this.addr,
            to: to,
            amt: amt,
            h: h,
            ts: Date.now()
        });
        
        alert("Транзакция отправлена!");
        document.getElementById('to-amt').value = '';
    },

    mint() {
        const h = "MINT" + Date.now();
        net.get(h).put({
            from: "KAZNA",
            to: this.addr,
            amt: 1000,
            h: h,
            ts: Date.now()
        });
    },

    closeAdmin() { document.getElementById('admin').style.display = 'none'; }
};

app.init();
</script>
</body>
</html>
